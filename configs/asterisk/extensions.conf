[general]

[internal]
; Appel entre extensions
exten => _1XXX,1,NoOp(Appel vers ${EXTEN})
 same => n,Set(DND_STATUS=${DB(DND/${EXTEN})})
 same => n,GotoIf($["${DND_STATUS}" = "YES"]?dnd)
 same => n,Dial(PJSIP/${EXTEN},30,r)
 same => n,Voicemail(${EXTEN}@default,u)
 same => n,Hangup()
 same => n(dnd),Playback(custom/do-not-disturb)
 same => n,Voicemail(${EXTEN}@default,u)
 same => n,Hangup()

; Activation DnD manuellement
exten => *78,1,Set(DB(DND/${CALLERID(num)})=YES)
 same => n,Playback(custom/do-not-disturb)
 same => n,Hangup()

; Désactivation DnD manuellement
exten => *79,1,Set(DB(DND/${CALLERID(num)})=NO)
 same => n,Hangup()

; Accès messagerie vocale
exten => *98,1,VoiceMailMain(${CALLERID(num)}@default)
 same => n,Hangup()

; IVR Principal
exten => 9000,1,Answer()
 same => n,Wait(1)
 same => n,Goto(ivr-main,s,1)

[ivr-main]
exten => s,1,Answer()
 same => n,Set(TIMEOUT(digit)=5)
 same => n,Background(custom/accueil)
 same => n,WaitExten(10)

exten => 1,1,Playback(custom/service-compte)
 same => n,Dial(PJSIP/1001,30,r)
 same => n,Voicemail(1001@default,u)
 same => n,Hangup()

exten => 2,1,Playback(custom/service-rh)
 same => n,Dial(PJSIP/1001,30,r)
 same => n,Voicemail(1001@default,u)
 same => n,Hangup()

exten => 3,1,Playback(custom/service-support)
 same => n,Dial(PJSIP/1002,30,r)
 same => n,Voicemail(1002@default,u)
 same => n,Hangup()

exten => 0,1,Dial(PJSIP/1001,30,r)
 same => n,Hangup()

exten => i,1,Playback(invalid)
 same => n,Goto(s,1)

exten => t,1,Hangup()
